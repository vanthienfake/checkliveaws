<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AWS Account Checker</title>
  <meta name="description" content="Tool kiểm tra tài khoản AWS tồn tại">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <!-- Animated background -->
    <div class="bg-animation">
      <div class="bg-orb bg-orb-1"></div>
      <div class="bg-orb bg-orb-2"></div>
      <div class="bg-orb bg-orb-3"></div>
    </div>

    <!-- Header -->
    <header class="header" id="main-header">
      <div class="header-content">
        <div class="logo">
          <div class="logo-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
              <path d="M9 12l2 2 4-4"/>
            </svg>
          </div>
          <div class="logo-text">
            <h1>AWS Checker</h1>
            <span class="logo-subtitle">Account Existence Validator</span>
          </div>
        </div>
        <div class="connection-status" id="connection-status">
          <span class="conn-dot conn-reconnecting"></span>
          <span class="conn-text">Đang kết nối...</span>
        </div>
        <div class="header-stats" id="header-stats">
          <div class="stat-mini">
            <span class="stat-mini-value" id="stat-total">0</span>
            <span class="stat-mini-label">Total</span>
          </div>
          <div class="stat-mini stat-live">
            <span class="stat-mini-value" id="stat-live">0</span>
            <span class="stat-mini-label">Live</span>
          </div>
          <div class="stat-mini stat-dead">
            <span class="stat-mini-value" id="stat-dead">0</span>
            <span class="stat-mini-label">Dead</span>
          </div>
        </div>
      </div>
    </header>

    <!-- Main content -->
    <main class="main">
      <div class="container">
        <div class="grid">
          <!-- Left panel - Configuration -->
          <div class="panel panel-config">
            <div class="panel-header">
              <h2 class="panel-title">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="3"/>
                  <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
                Cấu hình
              </h2>
            </div>
            <div class="panel-body">
              <!-- Email input -->
              <div class="form-group">
                <label class="form-label" for="email-input">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                    <polyline points="22,6 12,13 2,6"/>
                  </svg>
                  Danh sách Email
                  <span class="email-count" id="email-count">0</span>
                </label>
                <textarea id="email-input" class="form-textarea" placeholder="Nhập email, mỗi email một dòng...&#10;example1@gmail.com&#10;example2@gmail.com&#10;example3@gmail.com" rows="8"></textarea>
                <div class="form-actions-row">
                  <button class="btn btn-sm btn-ghost" id="btn-clear-emails" title="Xóa tất cả">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <polyline points="3 6 5 6 21 6"/>
                      <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                    </svg>
                    Xóa
                  </button>
                  <label class="btn btn-sm btn-ghost" for="file-upload" title="Upload file .txt">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                      <polyline points="17 8 12 3 7 8"/>
                      <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    Upload
                  </label>
                  <input type="file" id="file-upload" accept=".txt" hidden>
                  <button class="btn btn-sm btn-ghost" id="btn-remove-dupes" title="Xóa trùng lặp">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                      <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                    </svg>
                    Lọc trùng
                  </button>
                </div>
              </div>

              <!-- Proxy input -->
              <div class="form-group">
                <label class="form-label" for="proxy-input">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="2" y="2" width="20" height="8" rx="2" ry="2"/>
                    <rect x="2" y="14" width="20" height="8" rx="2" ry="2"/>
                    <line x1="6" y1="6" x2="6.01" y2="6"/>
                    <line x1="6" y1="18" x2="6.01" y2="18"/>
                  </svg>
                  Proxy
                  <span class="badge badge-optional">Tùy chọn</span>
                </label>
                <textarea id="proxy-input" class="form-textarea" placeholder="host:port&#10;host:port:user:pass&#10;http://user:pass@host:port" rows="4"></textarea>
              </div>

              <!-- TMProxy Rotating Proxy -->
              <div class="form-group">
                <label class="form-label" for="tmproxy-keys">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                    <path d="M2 17l10 5 10-5"/>
                    <path d="M2 12l10 5 10-5"/>
                  </svg>
                  TMProxy API Keys
                  <span class="badge badge-tmproxy">Proxy Xoay</span>
                  <span class="email-count" id="tmproxy-key-count" style="background: #f59e0b;">0</span>
                </label>
                <textarea id="tmproxy-keys" class="form-textarea" placeholder="Nhập TMProxy API Key, mỗi key một dòng...&#10;401c0531c98e82e2052430cc988a8e4a&#10;89082c2b1b89e4bdfbd1a64550b84871&#10;3a69a589c821f8836a32a831302c5" rows="4"></textarea>
                <div class="settings-row" style="margin-top: 8px;">
                  <div class="form-group form-group-sm">
                    <label class="form-label" for="tmproxy-location">Khu vực</label>
                    <select id="tmproxy-location" class="form-input form-select">
                      <option value="0">Random</option>
                      <option value="10">Hà Nội</option>
                      <option value="9">TP HCM</option>
                      <option value="7">Cần Thơ</option>
                      <option value="5">Đà Nẵng</option>
                      <option value="2">Bắc Ninh</option>
                      <option value="4">Bình Dương</option>
                      <option value="11">Khánh Hòa</option>
                      <option value="12">Đồng Nai</option>
                      <option value="13">Long An</option>
                    </select>
                  </div>
                  <div class="form-group form-group-sm">
                    <label class="form-label" for="tmproxy-isp">ISP</label>
                    <select id="tmproxy-isp" class="form-input form-select">
                      <option value="0">Random</option>
                      <option value="1">Viettel</option>
                      <option value="2">VNPT</option>
                      <option value="3">FPT</option>
                      <option value="5">Mobifone</option>
                    </select>
                  </div>
                </div>
              </div>

              <!-- Captcha Key -->
              <div class="form-group">
                <label class="form-label" for="captcha-key">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                  </svg>
                  OMOcaptcha API Key
                  <span class="badge badge-optional">Tùy chọn</span>
                </label>
                <input type="text" id="captcha-key" class="form-input" placeholder="OMO_XXXXXXXXXXXX...">
              </div>

              <!-- Settings row -->
              <div class="settings-row">
                <div class="form-group form-group-sm">
                  <label class="form-label" for="threads">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <polyline points="16 3 21 3 21 8"/>
                      <line x1="4" y1="20" x2="21" y2="3"/>
                      <polyline points="21 16 21 21 16 21"/>
                      <line x1="15" y1="15" x2="21" y2="21"/>
                      <line x1="4" y1="4" x2="9" y2="9"/>
                    </svg>
                    Threads
                    <span class="badge badge-optional" id="threads-auto-badge" style="display:none;">Auto</span>
                  </label>
                  <input type="number" id="threads" class="form-input" value="1" min="1" max="10">
                </div>
                <div class="form-group form-group-sm">
                  <label class="form-label" for="delay">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <circle cx="12" cy="12" r="10"/>
                      <polyline points="12 6 12 12 16 14"/>
                    </svg>
                    Delay (ms)
                  </label>
                  <input type="number" id="delay" class="form-input" value="2000" min="500" max="30000" step="500">
                </div>
                <div class="form-group form-group-sm">
                  <label class="form-label" for="proxy-rotate">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M23 4v6h-6"/>
                      <path d="M1 20v-6h6"/>
                      <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                    </svg>
                    Đổi IP (s)
                  </label>
                  <input type="number" id="proxy-rotate" class="form-input" value="240" min="60" max="3600" step="10">
                </div>
              </div>

              <!-- Action buttons -->
              <div class="action-buttons">
                <button class="btn btn-primary btn-lg" id="btn-start">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="5 3 19 12 5 21 5 3"/>
                  </svg>
                  Bắt đầu kiểm tra
                </button>
                <button class="btn btn-danger btn-lg" id="btn-stop" disabled>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="6" y="6" width="12" height="12" rx="2"/>
                  </svg>
                  Dừng
                </button>
              </div>
            </div>
          </div>

          <!-- Right panel - Results -->
          <div class="panel panel-results">
            <div class="panel-header">
              <h2 class="panel-title">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                  <polyline points="14 2 14 8 20 8"/>
                  <line x1="16" y1="13" x2="8" y2="13"/>
                  <line x1="16" y1="17" x2="8" y2="17"/>
                </svg>
                Kết quả
              </h2>
              <div class="panel-header-actions">
                <div class="tab-group" id="result-tabs">
                  <button class="tab active" data-tab="all">Tất cả</button>
                  <button class="tab" data-tab="live">Live</button>
                  <button class="tab" data-tab="dead">Dead</button>
                  <button class="tab" data-tab="error">Error</button>
                </div>
              </div>
            </div>
            <div class="panel-body">
              <!-- Progress bar -->
              <div class="progress-section" id="progress-section" style="display: none;">
                <div class="progress-info">
                  <span id="progress-text">0 / 0</span>
                  <span id="progress-percent">0%</span>
                </div>
                <div class="progress-bar">
                  <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
                </div>
              </div>

              <!-- Stats cards -->
              <div class="stats-grid" id="stats-grid">
                <div class="stat-card stat-card-total">
                  <div class="stat-card-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                      <circle cx="9" cy="7" r="4"/>
                      <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                      <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                  </div>
                  <div class="stat-card-info">
                    <span class="stat-card-value" id="card-total">0</span>
                    <span class="stat-card-label">Đã kiểm tra</span>
                  </div>
                </div>
                <div class="stat-card stat-card-live">
                  <div class="stat-card-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                      <polyline points="22 4 12 14.01 9 11.01"/>
                    </svg>
                  </div>
                  <div class="stat-card-info">
                    <span class="stat-card-value" id="card-live">0</span>
                    <span class="stat-card-label">Live</span>
                  </div>
                </div>
                <div class="stat-card stat-card-dead">
                  <div class="stat-card-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <circle cx="12" cy="12" r="10"/>
                      <line x1="15" y1="9" x2="9" y2="15"/>
                      <line x1="9" y1="9" x2="15" y2="15"/>
                    </svg>
                  </div>
                  <div class="stat-card-info">
                    <span class="stat-card-value" id="card-dead">0</span>
                    <span class="stat-card-label">Dead</span>
                  </div>
                </div>
                <div class="stat-card stat-card-error">
                  <div class="stat-card-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                      <line x1="12" y1="9" x2="12" y2="13"/>
                      <line x1="12" y1="17" x2="12.01" y2="17"/>
                    </svg>
                  </div>
                  <div class="stat-card-info">
                    <span class="stat-card-value" id="card-error">0</span>
                    <span class="stat-card-label">Error</span>
                  </div>
                </div>
              </div>

              <!-- Results list -->
              <div class="results-list" id="results-list">
                <div class="results-empty" id="results-empty">
                  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                  </svg>
                  <p>Chưa có kết quả. Nhập email và bắt đầu kiểm tra.</p>
                </div>
              </div>

              <!-- Export buttons -->
              <div class="export-section" id="export-section" style="display: none;">
                <button class="btn btn-sm btn-outline" id="btn-export-all">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                  </svg>
                  Export All
                </button>
                <button class="btn btn-sm btn-outline btn-outline-live" id="btn-export-live">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                  </svg>
                  Export Live
                </button>
                <button class="btn btn-sm btn-outline btn-outline-dead" id="btn-export-dead">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                  </svg>
                  Export Dead
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- Log panel -->
        <div class="panel panel-log">
          <div class="panel-header">
            <h2 class="panel-title">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="4 17 10 11 4 5"/>
                <line x1="12" y1="19" x2="20" y2="19"/>
              </svg>
              Console Log
            </h2>
            <button class="btn btn-sm btn-ghost" id="btn-clear-log">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
              </svg>
              Clear
            </button>
          </div>
          <div class="log-container" id="log-container">
            <div class="log-entry log-info">
              <span class="log-time">--:--:--</span>
              <span class="log-badge log-badge-info">INFO</span>
              <span class="log-msg">Sẵn sàng. Nhập email và nhấn "Bắt đầu kiểm tra".</span>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
